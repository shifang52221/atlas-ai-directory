services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-nav-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_nav
      POSTGRES_USER: ai_nav
      POSTGRES_PASSWORD: ai_nav_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_nav -d ai_nav"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
